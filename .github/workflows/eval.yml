name: Evaluation

on:
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  smoke_eval:
    name: Smoke Eval (PR Gate)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke evaluation
        env:
          EVAL_THRESHOLD_RETRIEVAL_HIT_RATE: "0.35"
          EVAL_THRESHOLD_RAG_ANSWER_RELEVANCY: "0.50"
          EVAL_THRESHOLD_AGENT_ROUTING_ACCURACY: "0.55"
          EVAL_THRESHOLD_AGENT_TASK_COMPLETION: "0.45"
        run: |
          python -m app.evaluation.runner --smoke --offline --strict

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval-report
          path: logs/evaluation/latest.json
          if-no-files-found: ignore

  nightly_full_eval:
    name: Nightly Full Eval
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python -m app.evaluation.runner --strict

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-eval-report
          path: logs/evaluation/latest.json
          if-no-files-found: ignore
