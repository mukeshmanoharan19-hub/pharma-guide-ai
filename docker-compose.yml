services:

  postgres:
    image: postgres:18

    container_name: pharma-guide-postgres

    environment:
      POSTGRES_DB: pharma_guide_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: pharma-guide-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

  api:
    build:
      context: .

    container_name: pharma-guide-api

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    environment:
      - REDIS_URL=redis://redis:6379/0

    volumes:
      - .:/app
      - ./data:/app/data

    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped

  frontend:
    image: node:20-alpine

    container_name: pharma-guide-frontend

    working_dir: /app/frontend

    depends_on:
      - api

    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules

    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
